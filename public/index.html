<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SupaForge — Supabase Alternative</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1c1c1c;--surface2:#242424;--surface3:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#ededed;--muted:#a0a0a0;--muted2:#6e6e6e;
  --brand:#3ECF8E;--brand-dim:#1a4731;--brand-dark:#2ba86d;
  --red:#e5484d;--red-dim:#3b1219;--yellow:#f5a623;--blue:#3b82f6;
  --radius:8px;--radius-sm:6px;--mono:"JetBrains Mono",ui-monospace,monospace;
  --sidebar:220px;
}
body{background:var(--bg);color:var(--text);font:13px Inter,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;outline:none}
input,textarea,select{font:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;background:var(--surface);position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--brand);width:var(--sidebar);flex-shrink:0}
.topbar-project{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);border-left:1px solid var(--border);padding-left:12px}
.topbar-project span{color:var(--text);font-weight:500}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.03em}
.badge-green{background:var(--brand-dim);color:var(--brand)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-yellow{background:#3a2a00;color:var(--yellow)}
.layout{display:flex;flex:1;min-height:0;height:calc(100vh - 48px)}
.sidebar{width:var(--sidebar);border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.nav-section{padding:8px 0}
.nav-label{padding:6px 16px;font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--brand);background:var(--brand-dim);border-left-color:var(--brand)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-divider{height:1px;background:var(--border);margin:4px 0}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding:12px}
.key-input-wrap{display:flex;flex-direction:column;gap:6px}
.key-label{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em}
.key-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);width:100%;font-size:11px}
.key-input:focus{border-color:var(--brand)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid transparent}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-brand{background:var(--brand);color:#021a0d;border-color:var(--brand)}
.btn-brand:hover{background:var(--brand-dark)}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--text)}
.btn-outline:hover{background:var(--surface2)}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:hover{color:var(--text)}
.btn-danger{background:var(--red-dim);color:var(--red);border-color:var(--red-dim)}
.btn-danger:hover{border-color:var(--red)}
.btn-full{width:100%}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-header{padding:20px 24px 12px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px}
.page-body{flex:1;overflow-y:auto;padding:20px 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.metric-val{font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--brand)}
.metric-label{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.split{display:flex;flex:1;overflow:hidden;min-height:0}
.split-left{width:240px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.split-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pane-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.pane-header-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.pane-body{flex:1;overflow-y:auto}
.table-list-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:12px;cursor:pointer;color:var(--muted);border-bottom:1px solid var(--border);transition:.1s}
.table-list-item:hover{background:var(--surface2);color:var(--text)}
.table-list-item.active{background:var(--brand-dim);color:var(--brand)}
.data-grid{flex:1;overflow:auto}
.data-grid table{width:100%;border-collapse:collapse;font-size:12px}
.data-grid th{position:sticky;top:0;background:var(--surface2);padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;z-index:1}
.data-grid td{padding:7px 12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-family:var(--mono);font-size:11px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
.data-grid td:last-child,.data-grid th:last-child{border-right:none}
.data-grid tr:hover td{background:var(--surface2)}
.null-val{color:var(--muted2);font-style:italic}
.row-actions{display:flex;gap:4px;opacity:0;transition:.1s}
tr:hover .row-actions{opacity:1}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-size:12px;width:200px}
.search-input:focus{border-color:var(--brand)}
.sql-textarea{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--mono);font-size:12px;line-height:1.6;resize:none;width:100%}
.sql-textarea:focus{border-color:var(--brand)}
.sql-result{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--mono);font-size:11px;overflow:auto;max-height:300px}
.sql-result-table{width:100%;border-collapse:collapse}
.sql-result-table th{background:var(--surface3);padding:7px 12px;font-size:11px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;font-weight:600}
.sql-result-table td{padding:6px 12px;border-bottom:1px solid var(--border);font-size:11px}
.sql-msg{padding:14px;color:var(--muted);font-size:12px}
.users-table{width:100%;border-collapse:collapse;font-size:12px}
.users-table th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0}
.users-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.users-table tr:hover td{background:var(--surface2)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--brand-dim);color:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.bucket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.bucket-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.12s;position:relative}
.bucket-card:hover{border-color:var(--brand)}
.bucket-icon{font-size:28px;margin-bottom:8px}
.bucket-name{font-weight:600;font-size:13px}
.bucket-meta{font-size:11px;color:var(--muted);margin-top:3px}
.bucket-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:var(--surface3)}
.file-list{width:100%;border-collapse:collapse;font-size:12px}
.file-list th{padding:8px 14px;text-align:left;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0;font-weight:600}
.file-list td{padding:8px 14px;border-bottom:1px solid var(--border)}
.file-list tr:hover td{background:var(--surface2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:min(480px,100%);display:flex;flex-direction:column;gap:14px;box-shadow:0 25px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:12px;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
.field-hint{font-size:11px;color:var(--muted2)}
.code-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--mono);font-size:11px;line-height:1.7;white-space:pre-wrap;overflow-x:auto}
#toast-root{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 16px;font-size:12px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;min-width:220px;animation:slideIn .2s}
.toast.ok{border-left:3px solid var(--brand)}
.toast.error{border-left:3px solid var(--red)}
.toast.warn{border-left:3px solid var(--yellow)}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.empty{padding:48px 20px;text-align:center;color:var(--muted2);display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:36px;opacity:.5}
.empty-title{font-size:14px;font-weight:600;color:var(--muted)}
.empty-sub{font-size:12px;max-width:280px;line-height:1.5}
.api-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.api-card-head{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.method-badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.04em;font-family:var(--mono);flex-shrink:0}
.method-GET{background:#0f3a24;color:#3ECF8E}
.method-POST{background:#0f2040;color:#79b8ff}
.method-PATCH{background:#3a2a00;color:#f5a623}
.method-DELETE{background:#3b1219;color:#e5484d}
.api-path{font-family:var(--mono);font-size:12px;color:var(--text)}
.api-card-body{padding:10px 14px;font-size:12px;color:var(--muted)}
.schema-col{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.schema-col:last-child{border-bottom:none}
.col-type{background:var(--surface3);border-radius:4px;padding:2px 7px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.col-pk{background:#0f2040;color:#79b8ff;border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700}
.settings-group{margin-bottom:24px}
.settings-title{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.settings-row:last-child{border-bottom:none}
.settings-key{font-size:12px;font-weight:600;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:2px}
.breadcrumb span{color:var(--muted2)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.row-num{color:var(--muted2);font-size:10px;user-select:none;text-align:right;padding-right:8px!important;min-width:36px}
.connect-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.connect-tab{padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.12s}
.connect-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M13 3L4 14h9l-2 7 9-11h-9l2-7z" fill="#3ECF8E"/></svg>
    SupaForge
  </div>
  <div class="topbar-project">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Project: <span id="proj-name">My Project</span>
  </div>
  <div class="topbar-right">
    <span id="conn-status" class="badge badge-yellow">⬤ Not connected</span>
    <button class="btn btn-outline btn-sm" onclick="showConnectModal()">Connection</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-section">
      <div class="nav-item active" data-nav="overview" onclick="navigate('overview')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="2" y="9" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="9" width="5" height="5" rx="1" fill="currentColor"/></svg>
        Overview
      </div>
      <div class="nav-item" data-nav="editor" onclick="navigate('editor')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Table Editor
      </div>
      <div class="nav-item" data-nav="sql" onclick="navigate('sql')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 4h10M3 8h7M3 12h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        SQL Editor
      </div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-label">Database</div>
      <div class="nav-item" data-nav="tables" onclick="navigate('tables')">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 6h12M6 6v8" stroke="currentColor" stroke-width="1.5"/></svg>
        Tables
      </div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-label">Auth</div>
      <div class="nav-item" data-nav="auth-users" onclick="navigate('auth-users')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Users
      </div>
      <div class="nav-item" data-nav="auth-policies" onclick="navigate('auth-policies')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2L3 5v4c0 3 2.5 5.5 5 6 2.5-.5 5-3 5-6V5L8 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Policies
      </div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-label">Storage</div>
      <div class="nav-item" data-nav="storage" onclick="navigate('storage')">
        <svg viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="5" rx="6" ry="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 5v6c0 1.38 2.686 2.5 6 2.5S14 12.38 14 11V5" stroke="currentColor" stroke-width="1.5"/></svg>
        Buckets
      </div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-label">Project</div>
      <div class="nav-item" data-nav="api" onclick="navigate('api')">
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 10l-2-2 2-2M12 6l2 2-2 2M9 4l-2 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        API Docs
      </div>
      <div class="nav-item" data-nav="settings" onclick="navigate('settings')">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 2v1M8 13v1M2 8h1M13 8h1M3.757 3.757l.707.707M11.536 11.536l.707.707M3.757 12.243l.707-.707M11.536 4.464l.707-.707" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Settings
      </div>

        <div class="key-label">API Key (x-api-key)</div>
        <input class="key-input" id="apiKey" type="password" placeholder="Paste your API key"/>
        <button class="btn btn-brand btn-full" style="margin-top:4px" onclick="connect()">Connect</button>
      </div>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>
<div id="toast-root"></div>
<div id="modal-root"></div>

<script>
// ── State ──
let apiKey = localStorage.getItem('sf_apikey') || '';
let currentNav = 'overview';
let tables = {};
let health = null;
let activeTable = null;
let tableRows = [];
let activeBucket = null;
let buckets = [];
let bucketObjects = [];
let authUsers = [];
let sqlHistory = JSON.parse(localStorage.getItem('sf_sql_history') || '[]');

document.getElementById('apiKey').value = apiKey;

// ── API ──
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', 'x-api-key': apiKey, ...(opts.headers || {}) };
  const res = await fetch(path, { ...opts, headers });
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('json') ? await res.json().catch(() => ({})) : await res.text();
  if (!res.ok) {
    const msg = typeof data === 'string' ? data : (data?.error?.message || data?.message || data?.error || `HTTP ${res.status}`);
    throw Object.assign(new Error(msg), { status: res.status });
  }
  return data;
}

// ── Toast ──
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = type === 'ok' ? '✓ ' + msg : type === 'error' ? '✗ ' + msg : '⚠ ' + msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Modal ──
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function showModal(html) { document.getElementById('modal-root').innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()">${html}</div>`; }

// ── Navigation ──
function navigate(nav) {
  currentNav = nav;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.nav === nav));
  if (nav !== 'storage') activeBucket = null;
  render();
}

function render() {
  const map = { overview: renderOverview, editor: renderEditor, sql: renderSQL, tables: renderTablesPage, 'auth-users': renderAuthUsers, 'auth-policies': renderPolicies, storage: renderStorage, api: renderAPI, settings: renderSettings };
  (map[currentNav] || renderOverview)();
}

function setMain(html) { document.getElementById('main-content').innerHTML = html; }

// ── Connect ──
async function connect() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('sf_apikey', apiKey);
  await boot();
}

async function boot() {
  if (!apiKey) return;
  try {
    [health, { tables }] = await Promise.all([api('/api/admin/health'), api('/api/tables')]);
    const s = document.getElementById('conn-status');
    s.className = 'badge badge-green'; s.textContent = '⬤ Connected';
    toast('Connected');
  } catch (e) {
    const s = document.getElementById('conn-status');
    s.className = 'badge badge-red'; s.textContent = '⬤ Error';
    toast(e.message, 'error');
  }
  render();
}

async function selectTable(name) { activeTable = name; renderEditor(); }

async function loadTableData(table) {
  try {
    const data = await api(`/api/tables/${encodeURIComponent(table)}?limit=200`);
    tableRows = data.data || [];
    const cols = tables[table]?.columns || (tableRows[0] ? Object.keys(tableRows[0]) : []);
    const pane = document.getElementById('table-data-pane');
    if (!pane) return;
    pane.innerHTML = `
<div class="toolbar">
  <span style="font-size:13px;font-weight:700">${esc(table)}</span>
  <span class="badge badge-green" style="font-size:10px">${tableRows.length} rows</span>
  <span style="flex:1"></span>
  <button class="btn btn-outline btn-sm" onclick="refreshTableData()">↻ Refresh</button>
  <button class="btn btn-brand btn-sm" onclick="showInsertRowModal()">+ Insert row</button>
</div>
<div class="data-grid">
  <table>
    <thead><tr>
      <th class="row-num">#</th>
      ${cols.map(c=>`<th>${esc(c)}</th>`).join('')}
      <th style="width:90px"></th>
    </tr></thead>
    <tbody>
      ${tableRows.length ? tableRows.map((row,i)=>`<tr>
        <td class="row-num">${i+1}</td>
        ${cols.map(c=>`<td title="${esc(String(row[c]??''))}">${row[c]===null||row[c]===undefined?'<span class="null-val">NULL</span>':esc(String(row[c]))}</td>`).join('')}
        <td><div class="row-actions">
          <button class="btn btn-ghost btn-sm" onclick="showEditRowModal(${i})" style="padding:3px 7px;font-size:10px">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRowById(${i})" style="padding:3px 7px;font-size:10px">Del</button>
        </div></td>
      </tr>`).join('')
      : `<tr><td colspan="${cols.length+2}" style="padding:40px;text-align:center;color:var(--muted2)">No rows yet — insert one to get started</td></tr>`}
    </tbody>
  </table>
</div>`;
  } catch(e) {
    const pane = document.getElementById('table-data-pane');
    if (pane) pane.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${esc(e.message)}</div></div>`;
    toast(e.message, 'error');
  }
}

function refreshTableData() { if (activeTable) loadTableData(activeTable); }

function showInsertRowModal() {
  const cols = (tables[activeTable]?.columns || []).filter(c => c !== 'id');
  showModal(`<div class="modal">
    <div class="modal-title">Insert Row into <span style="color:var(--brand)">${esc(activeTable)}</span></div>
    ${cols.length ? cols.map(c=>`<div class="field"><label>${esc(c)}</label><input id="ins_${esc(c)}" placeholder="${esc(c)}"/></div>`).join('')
    : `<div class="field"><label>JSON body</label><textarea id="ins_json" rows="4" placeholder='{"name":"Alice","email":"alice@example.com"}'></textarea></div>`}
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-brand" onclick="submitInsert()">Insert Row</button>
    </div>
  </div>`);
}

async function submitInsert() {
  const cols = (tables[activeTable]?.columns || []).filter(c => c !== 'id');
  let body;
  if (!cols.length) {
    try { body = JSON.parse(document.getElementById('ins_json')?.value); } catch { toast('Invalid JSON', 'error'); return; }
  } else {
    body = {};
    cols.forEach(c => { const v = document.getElementById(`ins_${c}`)?.value; if (v !== '') body[c] = v; });
  }
  try {
    await api(`/api/tables/${encodeURIComponent(activeTable)}`, { method: 'POST', body: JSON.stringify(body) });
    closeModal(); toast('Row inserted'); loadTableData(activeTable);
  } catch(e) { toast(e.message, 'error'); }
}

function showEditRowModal(idx) {
  const row = tableRows[idx];
  const cols = Object.keys(row);
  showModal(`<div class="modal">
    <div class="modal-title">Edit Row</div>
    ${cols.map(c=>`<div class="field"><label>${esc(c)}</label><input id="edit_${esc(c)}" value="${esc(String(row[c]??''))}"/></div>`).join('')}
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-brand" onclick="submitEdit(${idx})">Save Changes</button>
    </div>
  </div>`);
}

async function submitEdit(idx) {
  const row = tableRows[idx];
  const id = row.id;
  if (id === undefined) { toast('Row needs an id column', 'warn'); return; }
  const body = {};
  Object.keys(row).forEach(c => { const el = document.getElementById(`edit_${c}`); if (el) body[c] = el.value; });
  try {
    await api(`/api/tables/${encodeURIComponent(activeTable)}?id=eq.${encodeURIComponent(id)}`, { method: 'PUT', body: JSON.stringify(body) });
    closeModal(); toast('Row saved'); loadTableData(activeTable);
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteRowById(idx) {
  const row = tableRows[idx];
  const id = row.id;
  if (id === undefined) { toast('Row needs an id column to delete', 'warn'); return; }
  if (!confirm(`Delete row id=${id}?`)) return;
  try {
    await api(`/api/tables/${encodeURIComponent(activeTable)}?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
    toast('Row deleted'); loadTableData(activeTable);
  } catch(e) { toast(e.message, 'error'); }
}

async function dropTableConfirm() {
  if (!confirm(`Drop table "${activeTable}"? This cannot be undone.`)) return;
  try {
    await api('/api/query', { method: 'POST', body: JSON.stringify({ sql: `DROP TABLE ${activeTable}` }) });
    toast('Table dropped'); activeTable = null;
    const res = await api('/api/tables'); tables = res.tables || {};
    renderEditor();
  } catch(e) { toast(e.message, 'error'); }
}

function addColRow() {
  const id = 'col-' + (_colCount++);
  const list = document.getElementById('col-list');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;align-items:center';
  div.id = id;
  div.innerHTML = `<input placeholder="column_name" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 8px;color:var(--text);font-size:12px;flex:1"/>
    <select style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 8px;color:var(--text);font-size:12px;width:120px"><option>TEXT</option><option>INTEGER</option><option>REAL</option><option>NUMERIC</option><option>BLOB</option></select>
    <button onclick="document.getElementById('${id}').remove()" style="background:transparent;color:var(--muted);font-size:16px;border:none;cursor:pointer;flex-shrink:0">×</button>`;
  list.appendChild(div);
}

async function submitNewTable() {
  const name = document.getElementById('new-table-name').value.trim();
  if (!name) { toast('Table name required', 'warn'); return; }
  const rows = document.querySelectorAll('#col-list > div');
  const defs = [];
  rows.forEach((row, i) => {
    const [inp, sel] = row.querySelectorAll('input, select');
    if (!inp?.value?.trim()) return;
    let def = `${inp.value.trim()} ${sel?.value || 'TEXT'}`;
    if (i === 0) def += ' PRIMARY KEY AUTOINCREMENT';
    defs.push(def);
  });
  if (!defs.length) { toast('Add at least one column', 'warn'); return; }
  try {
    await api('/api/query', { method: 'POST', body: JSON.stringify({ sql: `CREATE TABLE ${name} (${defs.join(', ')})` }) });
    closeModal(); toast('Table created');
    const res = await api('/api/tables'); tables = res.tables || {};
    activeTable = name; navigate('editor');
  } catch(e) { toast(e.message, 'error'); }
}

  setMain(`

async function runSQL() {
  const sql = document.getElementById('sql-input')?.value?.trim();
  if (!sql) return;
  const statusEl = document.getElementById('sql-status');
  const resultEl = document.getElementById('sql-result');
  if (statusEl) statusEl.textContent = 'Running…';
  if (resultEl) resultEl.innerHTML = '<div class="sql-msg"><div class="spinner" style="display:inline-block"></div> Running…</div>';
  const t0 = Date.now();
  try {
    const out = await api('/api/query', { method: 'POST', body: JSON.stringify({ sql }) });
    const ms = Date.now() - t0;
    sqlHistory = [sql, ...sqlHistory.filter(q=>q!==sql)].slice(0, 20);
    localStorage.setItem('sf_sql_history', JSON.stringify(sqlHistory));
    if (statusEl) statusEl.textContent = `${ms}ms`;
    const res2 = await api('/api/tables'); tables = res2.tables || {};
    if (out.rows?.length > 0) {
      const cols = Object.keys(out.rows[0]);
      resultEl.innerHTML = `<table class="sql-result-table">
        <thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
        <tbody>${out.rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c]===null?'<span style="color:var(--muted2)">NULL</span>':esc(String(r[c]))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>`;
    } else {
      resultEl.innerHTML = `<div class="sql-msg" style="color:var(--brand)">✓ ${out.type||'Query'} completed${out.table?' on '+out.table:''}.</div>`;
    }
  } catch(e) {
    if (statusEl) statusEl.textContent = `Error`;
    resultEl.innerHTML = `<div class="sql-msg" style="color:var(--red)">✗ ${esc(e.message)}</div>`;
  }
}

function fileIcon(name) {
  const ext = name.split('.').pop()?.toLowerCase();
  if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
  if (['pdf'].includes(ext)) return '📄';
  if (['mp4','mov','avi','webm'].includes(ext)) return '🎬';
  if (['mp3','wav','ogg'].includes(ext)) return '🎵';
  if (['zip','tar','gz'].includes(ext)) return '📦';
  if (['json','csv','xml'].includes(ext)) return '📊';
  if (['js','ts','py','rb','go'].includes(ext)) return '💻';
  return '📄';
}

function showUploadModal() {
  showModal(`<div class="modal">
    <div class="modal-title">Upload File to <span style="color:var(--brand)">${esc(activeBucket)}</span></div>
    <div class="field"><label>File</label><input id="upload-file" type="file"/></div>
    <div class="field"><label>Path in bucket (optional)</label><input id="upload-path" placeholder="folder/file.ext"/><div class="field-hint">Defaults to the file name. Use / for folders.</div></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-brand" id="upload-btn" onclick="submitUpload()">Upload</button>
    </div>
  </div>`);
}

async function submitUpload() {
  const fileInput = document.getElementById('upload-file');
  const pathInput = document.getElementById('upload-path');
  const file = fileInput?.files?.[0];
  if (!file) { toast('Select a file', 'warn'); return; }
  const filePath = pathInput?.value?.trim() || file.name;
  const btn = document.getElementById('upload-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Uploading…'; }
  try {
    const b64 = await fileToBase64(file);
    await api(`/api/storage/v1/objects`, {
      method: 'POST',
      body: JSON.stringify({ data: b64, encoding: 'base64', bucket: activeBucket, path: filePath }),
    });
    closeModal(); toast('File uploaded'); loadBucketObjects();
  } catch(e) { toast(e.message, 'error'); if (btn) { btn.disabled=false; btn.textContent='Upload'; } }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function downloadFile(name) {
  try {
    const res = await fetch(`/api/storage/v1/objects/${encodeURIComponent(activeBucket)}/${encodeURIComponent(name)}`, { headers: { 'x-api-key': apiKey } });
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteFileConfirm(name) {
  if (!confirm(`Delete "${name}"?`)) return;
  try {
    await api(`/api/storage/v1/objects/${encodeURIComponent(activeBucket)}/${encodeURIComponent(name)}`, { method: 'DELETE' });
    toast('Deleted'); loadBucketObjects();
  } catch(e) { toast(e.message, 'error'); }
}

async function loadAuditLogs() {
  try {
    const { events } = await api('/api/admin/audit?limit=20');
    const el = document.getElementById('audit-area');
    if (!el) return;
    if (!events?.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted2)">No events recorded yet</div>'; return; }
    el.innerHTML = `<div class="card" style="padding:0;overflow:hidden"><table class="users-table">
      <thead><tr><th>Time</th><th>Method</th><th>Action</th><th>Table</th><th>Status</th></tr></thead>
      <tbody>${events.map(e=>`<tr>
        <td style="font-size:10px;color:var(--muted);font-family:var(--mono)">${e.at?.slice(11,19)||''}</td>
        <td>${e.method?`<span class="method-badge method-${e.method}" style="font-size:9px">${e.method}</span>`:'—'}</td>
        <td style="font-size:11px">${esc(e.action||'')}</td>
        <td style="font-family:var(--mono);font-size:10px">${esc(e.table||'')}</td>
        <td><span class="badge ${e.status==='success'?'badge-green':'badge-red'}" style="font-size:9px">${esc(e.status||'')}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch(e) {}
}

function switchTab(tab, id) {
  document.querySelectorAll('.connect-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  ['ctab-js','ctab-py','ctab-curl'].forEach(t=>{
    const el = document.getElementById(t);
    if (el) el.style.display = t===id?'block':'none';
  });
}

// ── Helpers ──
function esc(s) { return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatBytes(b) { if(!b)return'0 B'; const k=1024,s=['B','KB','MB','GB']; const i=Math.floor(Math.log(b)/Math.log(k)); return(b/Math.pow(k,i)).toFixed(1)+' '+s[i]; }

// ── Init ──
render();
if (apiKey) boot();
