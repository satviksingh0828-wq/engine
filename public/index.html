<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Engine Console</title>
<style>
:root{--bg:#0b1117;--panel:#111a22;--panel2:#151f2a;--line:#243241;--text:#e6edf3;--muted:#8b9bad;--green:#3ecf8e;--green2:#193c30;--red:#ff6b6b;--yellow:#ffd166;--blue:#79c0ff;--radius:14px;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,#18382d 0,#0b1117 36%),var(--bg);color:var(--text);font:14px Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}button,input,textarea,select{font:inherit;border:1px solid var(--line);border-radius:10px;background:#0d141b;color:var(--text);padding:10px 12px}button{cursor:pointer}button.primary{background:linear-gradient(135deg,var(--green),#78f6bd);border:0;color:#06170f;font-weight:800}button.ghost{background:transparent}button.danger{background:#35171d;color:#ffb4b4;border-color:#5b2931}.layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{border-right:1px solid var(--line);background:rgba(11,17,23,.8);backdrop-filter:blur(18px);padding:18px;display:flex;flex-direction:column;gap:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:42px;height:42px;border-radius:12px;background:var(--green);display:grid;place-items:center;color:#062015;font-size:22px;font-weight:900}.brand h1{font-size:18px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav{display:grid;gap:7px}.nav button{text-align:left;border:0;background:transparent;color:var(--muted);padding:11px 12px}.nav button.active,.nav button:hover{background:var(--panel2);color:var(--text)}.key-card{margin-top:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;display:grid;gap:10px}.main{padding:26px;overflow:auto}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.top h2{margin:0;font-size:28px}.top p{margin:5px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{background:rgba(17,26,34,.86);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 14px 40px rgba(0,0,0,.18)}.metric{font-size:28px;font-weight:800}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.split{display:grid;grid-template-columns:340px 1fr;gap:16px}.table-list{display:grid;gap:8px;max-height:64vh;overflow:auto}.table-item{padding:12px;border:1px solid var(--line);border-radius:12px;background:#0d141b;display:flex;justify-content:space-between;cursor:pointer}.table-item.active{border-color:var(--green);background:var(--green2)}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.toolbar input{min-width:220px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--radius)}table{width:100%;border-collapse:collapse}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{color:var(--muted);font-size:12px;background:#0d141b;position:sticky;top:0}td input{width:100%;min-width:110px;font-family:var(--mono)}textarea{width:100%;min-height:190px;font-family:var(--mono);line-height:1.5}.result{white-space:pre-wrap;font-family:var(--mono);font-size:12px;max-height:370px;overflow:auto;background:#0d141b;border:1px solid var(--line);border-radius:var(--radius);padding:14px}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;background:#0d141b;border:1px solid var(--line);color:var(--muted);font-size:12px}.ok{color:var(--green)}.warn{color:var(--yellow)}.error{color:var(--red)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:grid;place-items:center;padding:20px}.modal-box{width:min(560px,100%);background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px}.fields{display:grid;gap:10px;margin:14px 0}.cols{display:grid;gap:8px}.col-row{display:grid;grid-template-columns:1fr 130px auto auto auto;gap:8px}.toast{position:fixed;right:20px;bottom:20px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--green);border-radius:12px;padding:12px 14px;box-shadow:0 20px 40px rgba(0,0,0,.3)}.empty{padding:36px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:var(--radius)}@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{position:sticky;top:0;z-index:5}.grid,.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="logo">E</div><div><h1>Engine Console</h1><p>GitHub SQLite backend</p></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="key-card">
      <label class="label">API key</label>
      <input id="apiKey" type="password" placeholder="x-api-key" />
      <button class="primary" onclick="saveKey()">Connect / Refresh</button>
      <button class="ghost" onclick="logout()">Clear key</button>
      <span class="pill">Stored locally in this browser</span>
    </div>
  </aside>
  <main class="main">
    <div class="top"><div><h2 id="pageTitle">Overview</h2><p id="pageSub">Project health, tables, API usage, policies, and SQL tools.</p></div><span id="status" class="pill warn">Not connected</span></div>
    <section id="content"></section>
  </main>
</div>
<div id="modalRoot"></div>
<script>
const tabs=[['overview','Overview'],['data','Table editor'],['sql','SQL editor'],['policies','Policies'],['audit','Audit logs'],['docs','API docs']];
let apiKey=localStorage.getItem('engine_api_key')||'';let active='overview';let tables={};let health=null;let currentTable=null;let rows=[];document.getElementById('apiKey').value=apiKey;
function nav(){document.getElementById('nav').innerHTML=tabs.map(([id,label])=>`<button class="${active===id?'active':''}" onclick="go('${id}')">${label}</button>`).join('')}
function title(t,s){document.getElementById('pageTitle').textContent=t;document.getElementById('pageSub').textContent=s||'';nav()}
function setStatus(text,cls='ok'){const el=document.getElementById('status');el.className='pill '+cls;el.textContent=text}
function toast(msg,type='ok'){const el=document.createElement('div');el.className='toast '+(type==='error'?'error':'');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3600)}
function saveKey(){apiKey=document.getElementById('apiKey').value.trim();localStorage.setItem('engine_api_key',apiKey);boot()}
function logout(){localStorage.removeItem('engine_api_key');apiKey='';document.getElementById('apiKey').value='';setStatus('Not connected','warn')}
async function api(path,opt={}){const res=await fetch(path,{...opt,headers:{'Content-Type':'application/json','x-api-key':apiKey,...(opt.headers||{})}});const data=await res.json().catch(()=>({}));if(!res.ok){const e=data.error?.message||data.error||('HTTP '+res.status);throw new Error(e)}return data}
async function boot(){if(!apiKey)return;try{[health,{tables}]=await Promise.all([api('/api/admin/health'),api('/api/tables')]);setStatus('Connected','ok');render()}catch(e){setStatus('Connection failed','error');toast(e.message,'error');render()}}
function go(id){active=id;render()}
function render(){if(active==='overview')return renderOverview();if(active==='data')return renderData();if(active==='sql')return renderSql();if(active==='policies')return renderPolicies();if(active==='audit')return renderAudit();renderDocs()}
function renderOverview(){title('Overview','Project status, storage backend, limits, and quick actions.');const names=Object.keys(tables||{});content.innerHTML=`<div class="grid"><div class="card"><div class="label">Status</div><div class="metric ${health?'ok':'warn'}">${health?'OK':'—'}</div></div><div class="card"><div class="label">Tables</div><div class="metric">${names.length}</div></div><div class="card"><div class="label">Backend</div><div class="metric" style="font-size:20px">${health?.storage||'github-sqlite'}</div></div><div class="card"><div class="label">Rate limit</div><div class="metric" style="font-size:20px">${health?.limits?.rateLimitPerMinute||120}/min</div></div></div><div style="height:16px"></div><div class="split"><div class="card"><h3>Tables</h3><div class="table-list">${names.length?names.map(n=>`<div class="table-item"><span>▤ ${esc(n)}</span><span>${(tables[n].columns||[]).length} cols</span></div>`).join(''):'<div class="empty">No tables yet.</div>'}</div></div><div class="card"><h3>Getting closer to Supabase</h3><p>Engine now has scoped keys, rate limits, audit logs, schema policies, safer identifiers, admin health checks, and a production-style dashboard shell.</p><p class="warn">Next architectural step: add a Postgres storage adapter for high write volume and joins.</p><button class="primary" onclick="go('data')">Manage data</button> <button onclick="go('docs')">View API docs</button></div></div>`}
function tableList(){const names=Object.keys(tables||{});return `<div class="card"><div class="toolbar"><input placeholder="Search tables" oninput="filterTables(this.value)"><button class="primary" onclick="newTable()">+ Table</button></div><div class="table-list" id="tableList">${names.map(n=>`<div class="table-item ${n===currentTable?'active':''}" data-name="${esc(n).toLowerCase()}" onclick="currentTable='${esc(n)}';renderData()"><span>▤ ${esc(n)}</span><span>${(tables[n].columns||[]).length}</span></div>`).join('')||'<div class="empty">No tables.</div>'}</div></div>`}
function filterTables(q){q=q.toLowerCase();document.querySelectorAll('#tableList .table-item').forEach(el=>el.style.display=el.dataset.name.includes(q)?'flex':'none')}
async function renderData(){title('Table editor','Browse, insert, update, delete, and create tables without writing SQL.');if(!currentTable&&Object.keys(tables||{}).length)currentTable=Object.keys(tables)[0];content.innerHTML=`<div class="split">${tableList()}<div class="card" id="dataPanel">${currentTable?'Loading…':'<div class="empty">Select or create a table.</div>'}</div></div>`;if(currentTable)await loadRows()}
async function loadRows(){try{const out=await api('/api/tables/'+encodeURIComponent(currentTable));rows=out.data||[];const cols=tables[currentTable]?.columns||(rows[0]?Object.keys(rows[0]):[]);dataPanel.innerHTML=`<div class="toolbar"><h3 style="margin-right:auto">${esc(currentTable)} <span class="pill">${rows.length} rows</span></h3><button class="primary" onclick="addRow()">+ Row</button><button class="danger" onclick="dropTable()">Drop table</button></div>${rows.length?`<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}<th></th></tr></thead><tbody>${rows.map((r,i)=>`<tr>${cols.map(c=>`<td><input data-i="${i}" data-c="${esc(c)}" value="${esc(r[c]??'')}"></td>`).join('')}<td><button onclick="saveRow(${i})">Save</button> <button class="danger" onclick="deleteRow(${i})">Delete</button></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">No rows yet.</div>'}`;}catch(e){dataPanel.innerHTML='<div class="empty error">'+esc(e.message)+'</div>'}}
async function saveRow(i){const id=rows[i].id;if(id===undefined)return toast('Need an id column to update rows.','error');const body={};document.querySelectorAll(`[data-i="${i}"]`).forEach(x=>body[x.dataset.c]=x.value);try{await api('/api/tables/'+encodeURIComponent(currentTable)+'?id=eq.'+encodeURIComponent(id),{method:'PUT',body:JSON.stringify(body)});toast('Row saved');loadRows()}catch(e){toast(e.message,'error')}}
async function deleteRow(i){const id=rows[i].id;if(id===undefined)return toast('Need an id column to delete rows.','error');if(!confirm('Delete row '+id+'?'))return;try{await api('/api/tables/'+encodeURIComponent(currentTable)+'?id=eq.'+encodeURIComponent(id),{method:'DELETE'});toast('Row deleted');loadRows()}catch(e){toast(e.message,'error')}}
async function dropTable(){if(!confirm('Drop table '+currentTable+'?'))return;try{await api('/api/query',{method:'POST',body:JSON.stringify({sql:'DROP TABLE '+currentTable})});toast('Table dropped');currentTable=null;await boot()}catch(e){toast(e.message,'error')}}
function addRow(){const cols=(tables[currentTable]?.columns||[]).filter(c=>c!=='id');modalRoot.innerHTML=`<div class="modal"><div class="modal-box"><h3>Insert row</h3><div class="fields">${cols.map(c=>`<label>${esc(c)}<input data-col="${esc(c)}"></label>`).join('')}</div><button class="primary" onclick="submitRow()">Insert</button> <button onclick="modalRoot.innerHTML=''">Cancel</button></div></div>`}
async function submitRow(){const body={};document.querySelectorAll('[data-col]').forEach(x=>{if(x.value!=='')body[x.dataset.col]=x.value});try{await api('/api/tables/'+encodeURIComponent(currentTable),{method:'POST',body:JSON.stringify(body)});modalRoot.innerHTML='';toast('Inserted');loadRows()}catch(e){toast(e.message,'error')}}
let colN=0;function newTable(){colN=0;modalRoot.innerHTML=`<div class="modal"><div class="modal-box"><h3>New table</h3><input id="nt" placeholder="table_name"><div class="cols" id="cols"></div><button onclick="col()">+ Column</button><hr><button class="primary" onclick="submitTable()">Create</button> <button onclick="modalRoot.innerHTML=''">Cancel</button></div></div>`;col('id','INTEGER',true);col('name','TEXT',false)}
function col(n='',t='TEXT',pk=false){const id='c'+colN++;cols.insertAdjacentHTML('beforeend',`<div class="col-row" id="${id}"><input placeholder="column" value="${esc(n)}"><select><option ${t==='TEXT'?'selected':''}>TEXT</option><option ${t==='INTEGER'?'selected':''}>INTEGER</option><option>REAL</option><option>NUMERIC</option><option>BLOB</option></select><label><input type="checkbox" ${pk?'checked':''}> PK</label><label><input type="checkbox"> Not null</label><button onclick="${id}.remove()">×</button></div>`)}
async function submitTable(){const name=nt.value.trim();const defs=[...document.querySelectorAll('.col-row')].map(r=>{const [i,s]=r.querySelectorAll('input,select');let d=i.value.trim()+' '+s.value;if(r.querySelectorAll('input')[1].checked)d+=' PRIMARY KEY'+(s.value==='INTEGER'?' AUTOINCREMENT':'');if(r.querySelectorAll('input')[2].checked)d+=' NOT NULL';return d});try{await api('/api/query',{method:'POST',body:JSON.stringify({sql:`CREATE TABLE ${name} (${defs.join(', ')})`})});modalRoot.innerHTML='';toast('Table created');currentTable=name;await boot();active='data';render()}catch(e){toast(e.message,'error')}}
function renderSql(){title('SQL editor','Admin-only raw SQL. Prefer table editor or REST endpoints for public clients.');content.innerHTML=`<div class="card"><textarea id="sql" placeholder="SELECT * FROM users"></textarea><div class="toolbar"><button class="primary" onclick="runSql()">Run query</button><button onclick="sql.value='CREATE TABLE users (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT, email TEXT)'">Example CREATE</button></div><div class="result" id="result">Results appear here.</div></div>`}
async function runSql(){result.textContent='Running…';try{const out=await api('/api/query',{method:'POST',body:JSON.stringify({sql:sql.value})});result.textContent=JSON.stringify(out,null,2);await boot()}catch(e){result.textContent=e.message;toast(e.message,'error')}}
async function renderPolicies(){title('Policies','Configure allowed roles for each table operation.');content.innerHTML='<div class="card">Loading…</div>';try{const out=await api('/api/admin/policies');const names=Object.keys(out.tables||{});content.innerHTML=`<div class="card"><p class="warn">Policy enforcement is role based. Current keys normally run as admin/service unless API_KEYS roles are configured.</p><div class="table-wrap"><table><thead><tr><th>Table</th><th>Select</th><th>Insert</th><th>Update</th><th>Delete</th></tr></thead><tbody>${names.map(n=>{const p=out.tables[n].policies||{};return `<tr><td>${esc(n)}</td>${['select','insert','update','delete'].map(op=>`<td><input id="${op}-${esc(n)}" value="${esc((p[op]?.roles||[]).join(','))}"></td>`).join('')}</tr>`}).join('')}</tbody></table></div><br><button class="primary" onclick="savePolicies()">Save visible policy edits</button></div>`}catch(e){content.innerHTML='<div class="empty error">'+esc(e.message)+'</div>'}}
async function savePolicies(){try{for(const name of Object.keys(tables)){const policies={};for(const op of ['select','insert','update','delete']){const el=document.getElementById(op+'-'+name);if(el)policies[op]={roles:el.value.split(',').map(x=>x.trim()).filter(Boolean)}}if(Object.keys(policies).length)await api('/api/admin/policies',{method:'PUT',body:JSON.stringify({table:name,policies})})}toast('Policies saved')}catch(e){toast(e.message,'error')}}
async function renderAudit(){title('Audit logs','Recent in-memory events for this server instance.');content.innerHTML='<div class="card">Loading…</div>';try{const out=await api('/api/admin/audit');content.innerHTML=`<div class="card"><div class="table-wrap"><table><thead><tr><th>Time</th><th>Action</th><th>Table</th><th>Status</th><th>Path</th></tr></thead><tbody>${(out.events||[]).map(e=>`<tr><td>${esc(e.at)}</td><td>${esc(e.action||'')}</td><td>${esc(e.table||'')}</td><td>${esc(e.status||'')}</td><td>${esc(e.path||'')}</td></tr>`).join('')}</tbody></table></div></div>`}catch(e){content.innerHTML='<div class="empty error">'+esc(e.message)+'</div>'}}
function renderDocs(){title('API docs','Windows CMD examples use x-api-key: Testplay.');content.innerHTML=`<div class="card"><h3>Windows CMD quickstart</h3><div class="result">curl -H "x-api-key: Testplay" https://your-project.vercel.app/api/init\n\ncurl -X POST https://your-project.vercel.app/api/query ^\n  -H "Content-Type: application/json" ^\n  -H "x-api-key: Testplay" ^\n  -d "{\"sql\":\"CREATE TABLE users (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT, email TEXT)\"}"\n\ncurl -X POST https://your-project.vercel.app/api/tables/users ^\n  -H "Content-Type: application/json" ^\n  -H "x-api-key: Testplay" ^\n  -d "{\"name\":\"Asha\",\"email\":\"asha@example.com\"}"\n\ncurl -H "x-api-key: Testplay" "https://your-project.vercel.app/api/tables/users?order=id.desc&limit=10"</div><h3>Environment keys</h3><p><code>API_KEY=Testplay</code> keeps legacy admin mode. <code>API_KEYS=name:key:role,name2:key2:role</code> adds scoped keys.</p></div>`}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
nav();render();boot();
</script>
</body>
</html>
